<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE Simulator | QuickUtils</title>
    <meta name="description" content="Financial Independence calculator with compound growth projections over 40 years.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">📈 FIRE Simulator</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">FIRE Simulator</h1><p class="text-muted">Calculate your path to Financial Independence</p></div>
    <div class="d-flex gap-4" style="flex-wrap:wrap;">
        <div class="glass-card p-4" style="flex:1;min-width:280px;">
            <h3>Your Numbers</h3>
            <div class="mb-3"><label class="text-muted text-sm">Current Savings ($)</label><input type="number" id="savings" class="form-control" value="50000"></div>
            <div class="mb-3"><label class="text-muted text-sm">Annual Income ($)</label><input type="number" id="income" class="form-control" value="80000"></div>
            <div class="mb-3"><label class="text-muted text-sm">Annual Expenses ($)</label><input type="number" id="expenses" class="form-control" value="40000"></div>
            <div class="mb-3"><label class="text-muted text-sm">Expected ROI (%)</label><input type="number" id="roi" class="form-control" value="7" step="0.5"></div>
            <div class="mb-3"><label class="text-muted text-sm">Withdrawal Rate (%)</label><input type="number" id="withdraw" class="form-control" value="4" step="0.5"></div>
            <button class="btn btn-primary w-100" id="calcBtn">Calculate FIRE Number</button>
        </div>
        <div class="glass-card p-4" style="flex:1;min-width:280px;">
            <div id="fireResult" class="text-center mb-3"></div>
            <canvas id="fireChart" height="300" style="width:100%;"></canvas>
        </div>
    </div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
